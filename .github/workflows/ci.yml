name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # --- Verify Changelog ---
  verify-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Changelog Format
        shell: python3 {0}
        run: |
          import re
          import sys
          import xml.etree.ElementTree as ET

          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          tree = ET.parse('pom.xml')
          version = tree.find('m:version', ns).text.strip()

          is_snapshot = version.endswith('-SNAPSHOT')
          expected_header = f'## v{version} (snapshot)' if is_snapshot else f'## v{version}'

          label = 'Snapshot' if is_snapshot else 'Release'
          print(f'Checking for {label} version: {version}')

          with open('CHANGELOG.md', encoding='utf-8') as f:
              changelog = f.read()

          # Require: blank line, then the header, then blank line, then "Date: YYYY-MM-DD"
          escaped = re.escape(expected_header)
          pattern = re.compile(r'\n\n' + escaped + r'\n\nDate: \d{4}-\d{2}-\d{2}')

          if pattern.search(changelog):
              print('✅ CHANGELOG.md is correctly formatted.')
          else:
              print(f'❌ Error: CHANGELOG.md is missing an entry or formatted incorrectly.', file=sys.stderr)
              print(f'Expected format:\n\n[Blank Line]\n{expected_header}\n\nDate: YYYY-MM-DD', file=sys.stderr)
              sys.exit(1)

  # --- Tests ---
  test:
    needs: verify-changelog  # Prevents tests from running if changelog is wrong
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: ./mvnw --batch-mode -no-transfer-progress prepare-package -Pci
        shell: bash

      - uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: Test Report (${{ matrix.os }})

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

      - uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        with:
          paths: |
            ${{ github.workspace }}/ls/server/target/site/jacoco/jacoco.xml
            ${{ github.workspace }}/core/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage Report
          update-comment: true
