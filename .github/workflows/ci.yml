name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: ./mvnw --batch-mode -no-transfer-progress prepare-package -Pci
        shell: bash

      - uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: Test Report (${{ matrix.os }})

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

      - uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        with:
          paths: |
            ${{ github.workspace }}/ls/server/target/site/jacoco/jacoco.xml
            ${{ github.workspace }}/core/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage Report
          update-comment: true
