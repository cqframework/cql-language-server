name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # --- Changelog (PR only; informational, does not gate tests) ---
  verify-changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Changelog Format
        shell: python3 {0}
        run: |
          import re
          import sys
          import xml.etree.ElementTree as ET

          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          tree = ET.parse('pom.xml')
          version = tree.find('m:version', ns).text.strip()

          clean_version = version.removesuffix('-SNAPSHOT')
          expected_header = f'## v{clean_version}'

          print(f'Checking for version: {version}')

          with open('CHANGELOG.md', encoding='utf-8') as f:
              changelog = f.read()

          # Require: blank line, then the header, then blank line, then "Date: YYYY-MM-DD"
          escaped = re.escape(expected_header)
          pattern = re.compile(r'\n\n' + escaped + r'\n\nDate: \d{4}-\d{2}-\d{2}')

          if pattern.search(changelog):
              print('✅ CHANGELOG.md is correctly formatted.')
          else:
              print(f'❌ Error: CHANGELOG.md is missing an entry or formatted incorrectly.', file=sys.stderr)
              print(f'Expected format:\n\n[Blank Line]\n{expected_header}\n\nDate: YYYY-MM-DD\n* ...', file=sys.stderr)
              sys.exit(1)

  # --- Formatting check (independent; does not gate tests) ---
  format:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Check formatting
        run: ./mvnw spotless:check
      - uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message-success: |
            Formatting check succeeded!
          message-failure: |
            **This Pull Request has failed the formatting check**

            Please run `./mvnw spotless:apply` to fix the formatting issues.

  # --- Tests + coverage ---
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode --no-transfer-progress prepare-package -Pci
        shell: bash

      - uses: mikepenz/action-junit-report@v4
        if: (success() || failure()) && runner.os == 'Linux'
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: Test Report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

      - uses: madrapps/jacoco-report@v1.7.2
        if: (success() || failure()) && github.event_name == 'pull_request' && runner.os == 'Linux'
        with:
          paths: |
            ${{ github.workspace }}/ls/server/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage Report
          update-comment: true

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: (success() || failure()) && runner.os == 'Linux'
        with:
          files: ls/server/target/site/jacoco/jacoco.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
